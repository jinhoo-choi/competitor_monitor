name: eBiz 인사이트봇

on:
  workflow_dispatch:
  repository_dispatch:
    types: [run_monitor]

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: seen_articles.json 최신화
        run: git pull --rebase origin main || true

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 패키지 설치
        run: pip install -r requirements.txt

      - name: 모니터 실행
        env:
          NAVER_CLIENT_ID:     ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_USER:          ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD:  ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENTS:          ${{ secrets.RECIPIENTS }}
          RECIPIENTS_CC:       ${{ secrets.RECIPIENTS_CC }}
          NO_RESULT_RECEIVER:  ${{ secrets.NO_RESULT_RECEIVER }}
        run: python monitor_v2.py

      - name: seen_articles.json 커밋
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f seen_articles.json filter_log_*.json || true
          git diff --staged --quiet || git commit -m "chore: update seen_articles [skip ci]"
          git push || true
