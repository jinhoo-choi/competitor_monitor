name: eBiz 인사이트봇

on:
  workflow_dispatch:
  repository_dispatch:
    types: [run_monitor]

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 패키지 설치
        run: pip install -r requirements.txt

      - name: seen_articles.json 복원
        uses: actions/cache@v4
        with:
          path: seen_articles.json
          key: seen-articles-${{ runner.os }}
          restore-keys: seen-articles-

      - name: 모니터 실행
        env:
          NAVER_CLIENT_ID:     ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_USER:          ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD:  ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENTS:          ${{ secrets.RECIPIENTS }}
          RECIPIENTS_HIGH:     ${{ secrets.RECIPIENTS_HIGH }}
          NO_RESULT_RECEIVER:  ${{ secrets.NO_RESULT_RECEIVER }}
        run: python monitor_v2.py

      - name: seen_articles.json 저장
        uses: actions/cache/save@v4
        if: always()
        with:
          path: seen_articles.json
          key: seen-articles-${{ runner.os }}